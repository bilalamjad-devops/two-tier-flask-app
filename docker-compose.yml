version: "3.8"

services:

  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./message.sql:/docker-entrypoint-initdb.d/message.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s


  backend:
    image: bilalamjaddevops/flaskapp:latest
    container_name: backend
    restart: always

    ports:
      - "5000:5000"

    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DB: mydb

    depends_on:
      mysql:
        condition: service_healthy

    # Optional but recommended (for logs clarity)
    stdin_open: true
    tty: true


volumes:
  mysql-data:
